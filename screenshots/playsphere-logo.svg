<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" preserveAspectRatio="xMidYMid meet">
    <defs>
        <linearGradient id="textGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="30%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#8ef2ff" />
        </linearGradient>
        <radialGradient id="sphereGradient" cx="35%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#8ef2ff" stop-opacity="1" />
            <stop offset="40%" stop-color="#40e8ff" stop-opacity="0.95" />
            <stop offset="75%" stop-color="#00d4ff" stop-opacity="0.85" />
            <stop offset="100%" stop-color="#0095b8" stop-opacity="0.6" />
        </radialGradient>
        <radialGradient id="sphereCore" cx="35%" cy="35%" r="35%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
            <stop offset="60%" stop-color="#ffffff" stop-opacity="0.0" />
        </radialGradient>
        <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="sphereGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <linearGradient id="accentLineGradient" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#00d4ff" stop-opacity="0" />
            <stop offset="6%" stop-color="#0095b8" stop-opacity="0.30" />
            <stop offset="50%" stop-color="#4feeff" stop-opacity="0.45" />
            <stop offset="94%" stop-color="#0095b8" stop-opacity="0.30" />
            <stop offset="100%" stop-color="#00d4ff" stop-opacity="0" />
        </linearGradient>
        <filter id="lineGlow" x="-5%" y="-300%" width="110%" height="700%">
            <feGaussianBlur stdDeviation="0.8" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="pipGlow" x="-50%" y="-300%" width="200%" height="700%">
            <feGaussianBlur stdDeviation="1.7" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Stylized sphere with orbital rings (the "Sphere" mark) -->
    <g transform="translate(220, 200)" filter="url(#sphereGlow)">
        <!-- Outer orbital ring (tilted) -->
        <ellipse cx="0" cy="0" rx="135" ry="38" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.55" transform="rotate(-25)" />
        <!-- Second orbital ring (tilted other way) -->
        <ellipse cx="0" cy="0" rx="135" ry="38" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.45" transform="rotate(35)" />
        <!-- The sphere body -->
        <circle cx="0" cy="0" r="85" fill="url(#sphereGradient)" />
        <!-- Sphere highlight for depth -->
        <circle cx="0" cy="0" r="85" fill="url(#sphereCore)" />
        <!-- Sphere outline -->
        <circle cx="0" cy="0" r="85" fill="none" stroke="#40e8ff" stroke-width="2.5" />
        <!-- Inner detail ring -->
        <circle cx="0" cy="0" r="62" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.35" />
        <!-- Small orbital dots -->
        <circle cx="122" cy="-50" r="4" fill="#ffffff" opacity="0.9" />
        <circle cx="-115" cy="45" r="3" fill="#ffffff" opacity="0.7" />
    </g>

    <!-- Cyber-pip accent line above text -->
    <polygon points="460,105 1450,105 1490,108 1450,111 460,111 420,108" fill="url(#accentLineGradient)" filter="url(#lineGlow)" />
    <polygon points="520,105 470,105 470,96 420,108 470,120 470,111 520,111" fill="#4feeff" filter="url(#pipGlow)" opacity="0.7" />

    <!-- Wordmark: PLAYSPHERE -->
    <text x="430" y="260"
          font-family="Impact, 'Arial Black', sans-serif"
          font-size="155"
          font-weight="400"
          letter-spacing="9"
          fill="url(#textGradient)"
          filter="url(#textGlow)">PLAYSPHERE</text>

    <!-- Cyber-pip accent line below text -->
    <polygon points="460,292 1450,292 1490,295 1450,298 460,298 420,295" fill="url(#accentLineGradient)" filter="url(#lineGlow)" />
    <polygon points="1390,292 1440,292 1440,283 1490,295 1440,307 1440,298 1390,298" fill="#4feeff" filter="url(#pipGlow)" opacity="0.7" />

    <!-- Tagline (optional, can be removed) -->
    <text x="430" y="335"
          font-family="'Segoe UI', Arial, sans-serif"
          font-size="32"
          letter-spacing="6"
          fill="#ffffff"
          opacity="0.92">YOUR NO.1 SOURCE OF THE LATEST GAMES</text>
</svg>
